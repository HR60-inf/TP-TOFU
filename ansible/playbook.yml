---
# ==============================
# Etape 1 : Base sur tous les noeuds
# ==============================
- hosts: managers:workers
  become: yes
  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Install Docker
      apt:
        name: docker.io
        state: present

    - name: Start and enable Docker
      service:
        name: docker
        state: started
        enabled: yes

    - name: Add ubuntu to docker group
      user:
        name: ubuntu
        groups: docker
        append: yes

    - name: Installer le SDK Python Docker
      apt:
        name: python3-docker
        state: present

# ==============================
# Etape 2 : Initialiser le Manager
# ==============================
- hosts: managers
  become: yes
  tasks:
    - name: Initialiser Docker Swarm sur le manager
      community.docker.docker_swarm:
        state: present

    - name: Recuperer le join token worker
      shell: docker swarm join-token -q worker
      register: worker_token

    - name: Sauvegarder le token
      set_fact:
        swarm_worker_token: "{{ worker_token.stdout }}"
        swarm_manager_ip: "{{ ansible_host }}"

    - name: Creer le reseau overlay traefik-public
      community.docker.docker_network:
        name: traefik-public
        driver: overlay
        attachable: yes

    - name: Copier la stack Traefik sur le manager
      copy:
        src: ../docker/traefik-stack.yml
        dest: /home/ubuntu/traefik-stack.yml

    - name: Deployer Traefik
      shell: docker stack deploy -c /home/ubuntu/traefik-stack.yml traefik
      become: yes

    - name: Generer la stack whoami avec IP dynamique
      ansible.builtin.template:
        src: ./templates/app-whoami-stack.yml.j2
        dest: /home/ubuntu/app-whoami-stack.yml

    - name: Deployer whoami
      shell: docker stack deploy -c /home/ubuntu/app-whoami-stack.yml whoami
      become: yes

# ==============================
# Etape 3 : Worker rejoint le cluster
# ==============================
- hosts: workers
  become: yes
  tasks:
    - name: Faire rejoindre le worker au cluster Swarm
      community.docker.docker_swarm:
        state: join
        join_token: "{{ hostvars[groups['managers'][0]]['swarm_worker_token'] }}"
        remote_addrs:
          - "{{ hostvars[groups['managers'][0]]['swarm_manager_ip'] }}:2377"

# ==============================
# Etape 4 : NFS Serveur sur le Manager
# ==============================
- hosts: managers
  become: yes
  tasks:
    - name: Installer nfs-kernel-server
      apt:
        name: nfs-kernel-server
        state: present

    - name: Creer le dossier NFS
      file:
        path: /var/nfs/etherpad_data
        state: directory
        mode: '0777'

    - name: Configurer les exports NFS
      lineinfile:
        path: /etc/exports
        line: "/var/nfs/etherpad_data {{ hostvars[groups['workers'][0]]['ansible_host'] }}(rw,sync,no_subtree_check,no_root_squash)"
        create: yes

    - name: Redemarrer NFS
      service:
        name: nfs-kernel-server
        state: restarted

    - name: Generer et deployer la stack Etherpad
      ansible.builtin.template:
        src: ./templates/etherpad-stack.yml.j2
        dest: /home/ubuntu/etherpad-stack.yml

    - name: Deployer Etherpad
      shell: docker stack deploy -c /home/ubuntu/etherpad-stack.yml etherpad
      become: yes

# ==============================
# Etape 5 : NFS Client sur les Workers
# ==============================
- hosts: workers
  become: yes
  tasks:
    - name: Installer nfs-common
      apt:
        name: nfs-common
        state: present
