---
- hosts: all
  become: yes
  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600
    
    - name: Install Docker
      apt:
        name: docker.io
        state: present
    
    - name: Start Docker
      service:
        name: docker
        state: started
        enabled: yes
    
    - name: Install Docker Compose
      apt:
        name: docker-compose
        state: present
